[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-req=ext-gd"
]

[phases.build]
cmds = [
    "php artisan config:clear",
    "php artisan view:clear",
    "php artisan route:clear"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=AdminUserSeeder --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php -S 0.0.0.0:$PORT -t public"
